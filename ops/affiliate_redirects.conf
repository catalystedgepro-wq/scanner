# Affiliate redirect rules for catalystedgescanner.com
# Include this file in your nginx server block:
#   include /path/to/affiliate_redirects.conf;
#
# When real affiliate IDs are available, replace the target URLs below.
# The /go/ prefix keeps tracking links stable so newsletter and scanner
# links never need updating — only this file changes.

location = /go/webull {
    return 302 https://www.webull.com/;
}

location = /go/moomoo {
    return 302 https://www.moomoo.com/;
}

location = /go/tradier {
    return 302 https://www.tradier.com/;
}

location = /go/public {
    return 302 https://public.com/;
}
