    <style id="edge-gate-style">
      #edge-gate-overlay{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:2147483647;font-family:'Courier New',monospace;color:#e6bd6b}
      #edge-gate-card{background:#0a1529;border:1px solid rgba(215,180,106,.4);border-radius:12px;padding:28px 32px;max-width:480px;text-align:center;box-shadow:0 24px 56px rgba(0,0,0,.6)}

    <script>
    /* EDGE PRO ACCESS GATE v3 — admin token + cookie + localStorage + /api/tier. */
    (function(){
      var ADMIN_TOKEN = 'REPLACE_WITH_YOUR_ADMIN_TOKEN';
      function getCookie(name){
        try {
          var m = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]+)'));
          return m ? decodeURIComponent(m[1]) : '';
        } catch (e) { return ''; }
      }
      function setCookie(name, val){
        try {
          var d = new Date(); d.setTime(d.getTime() + 365*24*60*60*1000);
          document.cookie = name + '=' + encodeURIComponent(val)
            + '; expires=' + d.toUTCString() + '; path=/; samesite=lax';
        } catch (e) {}
      }
      function showPaywall(){
        var add = function(){
          if (document.getElementById('edge-gate-overlay')) return;
          var b = document.createElement('div');
          b.id = 'edge-gate-overlay';
          var card = document.createElement('div');
          card.id = 'edge-gate-card';
          var h2 = document.createElement('h2');
          h2.textContent = 'Edge Pro · Cerebro HUD';
          var p1 = document.createElement('p');
          p1.textContent = 'The 3D command HUD is part of Edge Pro. Subscribe to unlock the live force-graph, velocity deck, and convergence rail.';
          var cta = document.createElement('a');
          cta.href = '/pricing/'; cta.textContent = 'Upgrade — $39/mo';
          var back = document.createElement('a');
          back.className = 'secondary';
          back.href = '/'; back.textContent = '← Back to scanner';
          card.appendChild(h2); card.appendChild(p1); card.appendChild(cta); card.appendChild(back);
          b.appendChild(card);
          document.body.appendChild(b);
        };
        if (document.body) add();
        else document.addEventListener('DOMContentLoaded', add);
      }
      function unlock(){
        if (document.body) document.body.classList.add('edge-pro-unlocked');
        else document.addEventListener('DOMContentLoaded', function(){ document.body.classList.add('edge-pro-unlocked'); });
        var ov = document.getElementById('edge-gate-overlay');
        if (ov && ov.parentNode) ov.parentNode.removeChild(ov);
        var st = document.getElementById('edge-gate-style');
        if (st) st.remove();
      }
      // 1. URL token: persist + clean URL
      try {
        var url = new URL(window.location.href);
        if (url.searchParams.get('unlock') === ADMIN_TOKEN) {
          try { localStorage.setItem('edge_admin', ADMIN_TOKEN); } catch (e) {}
          setCookie('edge_admin', ADMIN_TOKEN);
          url.searchParams.delete('unlock');
          window.history.replaceState({}, '',
            url.pathname + (url.search || '') + url.hash);
        }
      } catch (e) {}
      // 2. localStorage / cookie
      var isAdmin = false;
      try { isAdmin = (localStorage.getItem('edge_admin') === ADMIN_TOKEN); } catch (e) {}
      if (!isAdmin && getCookie('edge_admin') === ADMIN_TOKEN) isAdmin = true;
      if (isAdmin) { unlock(); return; }
      // 3. server tier (existing flow)
      showPaywall();
      fetch('/api/tier', { credentials: 'include', cache: 'no-store' })
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d && d.tier === 'pro') unlock(); })
        .catch(function(){});
    })();
    </script>
